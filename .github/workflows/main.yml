name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pre-Clean Conflicting Configurations
        run: rm -rf capacitor.config.ts capacitor.config.json

      - name: Unzip Project Files
        run: |
          unzip "pos.zip--صيدلي-برو" -d temp_unzip || unzip *.zip -d temp_unzip || true
          TARGET_DIR=$(find temp_unzip -name "package.json" -exec dirname {} \;)
          if [ -n "$TARGET_DIR" ]; then
            cp -r $TARGET_DIR/* .
          else
            exit 1
          fi
          rm -rf temp_unzip

      - name: Build Web Application
        run: |
          npm install --force
          npm run build

      - name: Install Capacitor & Initialize
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Saydali Pro POS" "com.saydalipro.pos" --web-dir=dist

      # -------------------------------------------------------------
      # التعديل الرئيسي: تهيئة Capacitor لحماية شريط التنقل السفلي من التداخل
      # -------------------------------------------------------------
      - name: Configure Capacitor Settings
        run: |
          echo '{
            "appId": "com.saydalipro.pos",
            "appName": "Saydali Pro POS",
            "webDir": "dist",
            "plugins": {
              "StatusBar": {
                "overlaysWebView": false,
                "visible": false
              }
            }
          }' > capacitor.config.json

      - name: Add Android Platform & Sync
        run: |
          npx cap add android
          npx cap sync android

      # -------------------------------------------------------------
      # تعديل تصميم الـ styles لمنع الأزرار من الصعود تحت شريط أندرويد
      # -------------------------------------------------------------
      - name: Fix Layout Overlap in styles.xml
        run: |
          STYLES_PATH="android/app/src/main/res/values/styles.xml"
          if [ -f "$STYLES_PATH" ]; then
            echo "Applying Layout Fixes to styles.xml..."
            # إزالة أي كود يفرض التداخل (شفافية شريط التنقل) ليعود الشريط لمكانه الطبيعي خلف التطبيق
            sed -i '/<item name="android:navigationBarColor">/d' $STYLES_PATH
            sed -i '/<item name="android:windowTranslucentNavigation">/d' $STYLES_PATH
            
            # التأكد من إخفاء شريط الحالة العلوي فقط دون التأثير على شريط التنقل السفلي
            if ! grep -q "android:windowFullscreen" "$STYLES_PATH"; then
               sed -i '/<\/style>/i \    <item name="android:windowFullscreen">true</item>' $STYLES_PATH
            fi
            
            # منع تداخل محتوى التطبيق مع شريط التنقل السفلي
            sed -i '/<\/style>/i \    <item name="android:windowDrawsSystemBarBackgrounds">true</item>' $STYLES_PATH
          fi

      - name: Inject Camera Permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />' $MANIFEST_PATH

      - name: Setup Build Environment
        run: |
          cd android
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' build.gradle
          
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saydali-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
